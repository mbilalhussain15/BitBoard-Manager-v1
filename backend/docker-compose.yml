version: "3.9"

services:
  auth-service:
    build:
      context: ./services/authService
    container_name: auth-service
    working_dir: /app/services/authService
    ports:
      - "5001:5001"
    env_file:
      - .env
    volumes:
      # Mount the ENTIRE backend folder to /app
      - type: bind
        source: .
        target: /app
      # Keep container-local node_modules
      - /app/services/authService/node_modules
    command: npm run dev
    depends_on:
      - workspace-service
      - rabbitmq
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  workspace-service:
    build:
      context: ./services/workspaceService
    container_name: workspace-service
    working_dir: /app/services/workspaceService
    ports:
      - "5002:5002"
    env_file:
      - .env
    volumes:
      - type: bind
        source: .
        target: /app
      - /app/services/workspaceService/node_modules
    command: npm run dev
    depends_on:
      - rabbitmq
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Web UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ../frontend                 # compose file is in backend/
    container_name: frontend
    image: frontend
    ports:
      - "5173:5173"
    env_file:
      - ../frontend/.env
    volumes:
      - type: bind
        source: ../frontend
        target: /app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - auth-service
      - workspace-service
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  rabbitmq_data:


























